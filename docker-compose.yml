version: '3.8'

services:
  vibe-bot:
    build: .
    container_name: vibe_trading_bot
    restart: unless-stopped
    volumes:
      # Mount the data folder to persist DuckDB databases and reports on the host
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    # Default to running the live scheduler
    command: ["live"]

  backtester:
    build: .
    container_name: vibe_backtester
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    # Command to run backtest
    command: ["backtest", "--start", "2026-01-01"]

  trade-once:
    build: .
    container_name: vibe_trade_once
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    # Command to run on-demand trade
    command: ["trade-once"]

  vibe-api:
    build: .
    container_name: vibe_trading_api
    restart: unless-stopped
    ports:
      - "8008:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    entrypoint: ["uvicorn", "vibe_trading.web.main:app", "--host", "0.0.0.0", "--port", "8000"]

  vibe-web:
    build: ./web
    container_name: vibe_trading_web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - API_HOST=http://vibe-api:8000
    depends_on:
      - vibe-api

