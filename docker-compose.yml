version: '3.8'

services:
  vibe-bot:
    build: .
    container_name: vibe_trading_bot
    restart: unless-stopped
    volumes:
      # Mount the data folder to persist DuckDB databases and reports on the host
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    # Default to running the live scheduler
    command: ["live"]

  backtester:
    build: .
    container_name: vibe_backtester
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    # Command to run backtest
    command: ["backtest", "--start", "2026-01-01"]

  trade-once:
    build: .
    container_name: vibe_trade_once
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
    env_file:
      - .env
    # Command to run on-demand trade
    command: ["trade-once"]

